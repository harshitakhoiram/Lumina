version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: lumina_db
    environment:
      POSTGRES_USER: lumina_user
      POSTGRES_PASSWORD: lumina_password
      POSTGRES_DB: lumina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumina_api
    environment:
      DATABASE_URL: postgresql://lumina_user:lumina_password@db:5432/lumina
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      TMDB_API_KEY: ${TMDB_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5500}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
