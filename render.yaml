services:
  - type: web
    name: lumina-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    rootDir: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: lumina-postgres
    databaseName: lumina
    user: lumina_user
