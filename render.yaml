services:
  - type: web
    name: lumina-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      - key: TMDB_BEARER_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"

databases:
  - name: lumina-postgres
    databaseName: lumina
    user: lumina_user
