<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Lumina</title>
    <script src="config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assests/css/profile.css">
    <link rel="stylesheet" href="assests/css/responsive.css">
    <script defer src="assests/js/profile.js"></script>
</head>

<body>
    <main class="profile-page">
        <section class="profile-shell">
            <div class="profile-topbar">
                <a href="dashboard.html" class="topbar-link">← Back to Dashboard</a>
                <button type="button" class="topbar-btn" id="logoutBtn">Logout</button>
            </div>

            <div class="profile-card">
                <div class="profile-header">
                    <div>
                        <p class="eyebrow">Lumina Profile</p>
                        <h1>My Profile</h1>
                        <p class="profile-subtext">View and update your onboarding preferences.</p>
                    </div>
                    <button type="button" class="edit-btn" id="editBtn">Edit Profile</button>
                </div>

                <form id="profileForm" class="profile-form">
                    <!-- Name + Email -->
                    <div class="field-grid">
                        <div class="field-block">
                            <label for="profileName">User Name</label>
                            <input type="text" id="profileName" disabled>
                        </div>
                        <div class="field-block">
                            <label for="profileEmail">Email ID</label>
                            <input type="email" id="profileEmail" disabled>
                        </div>
                    </div>

                    <!-- Language + Genres -->
                    <div class="field-grid">
                        <div class="field-block">
                            <label>Language</label>
                            <div class="lang-list view-only" id="languageDisplay"></div>
                            <input type="text" id="profileLanguage" class="edit-only hidden" disabled placeholder="e.g. en, hi, fr">
                        </div>
                        <div class="field-block">
                            <label>Genres</label>
                            <div class="lang-list view-only" id="genresDisplay"></div>
                            <textarea id="profileGenres" rows="3" class="edit-only hidden" disabled placeholder="Comma-separated genres"></textarea>
                        </div>
                    </div>

                    <!-- Movies / Series -->
                    <div class="field-block">
                        <label>Movies / Series Selections</label>
                        <div class="poster-grid view-only" id="titlesGrid">
                            <span class="media-placeholder">Loading posters…</span>
                        </div>
                        <textarea id="profileTitles" rows="3" class="edit-only hidden" disabled placeholder="Comma-separated titles"></textarea>
                    </div>

                    <div class="profile-actions hidden" id="profileActions">
                        <button type="button" class="secondary-btn" id="cancelBtn">Cancel</button>
                        <button type="submit" class="primary-btn">Save Changes</button>
                    </div>

                    <p class="status-message" id="profileStatus"></p>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
