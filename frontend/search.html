<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search - Lumina</title>
    <script src="https://kit.fontawesome.com/e2bce648c2.js" crossorigin="hurphygames"></script>
    <link rel="stylesheet" href="assests/css/search.css" />
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a class="logo" href="dashboard.html"><img src="assests/LuminaLogo.png" alt="Lumina"></a>
            <div class="nav-buttons">
                <button id="homeBtn" class="nav-btn">Home</button>
                <button id="dashboardBtn" class="nav-btn">Dashboard</button>
                <button id="profileBtn" class="nav-btn">Profile</button>
                <button id="logoutBtn" class="nav-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="search-container">
        <h2>Discover Movies, Series & Books</h2>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search movies, TV series, or books..."
                autocomplete="off" />
            <div class="filter-buttons">
                <button class="filter-btn active" data-type="all">All</button>
                <button class="filter-btn" data-type="movie">Movies</button>
                <button class="filter-btn" data-type="series">Series</button>
                <button class="filter-btn" data-type="book">Books</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="searchResults" class="results-section hidden">
            <h3>Search Results</h3>
            <div id="resultsGrid" class="content-grid"></div>
        </div>

        <!-- Recommendations Section -->
        <div id="recommendationsSection" class="recommendations-section hidden">
            <h3 id="recommendationsTitle">You Might Like</h3>
            <div id="recommendationsGrid" class="content-grid"></div>
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="message hidden">
            <p>No results found. Try searching for something else!</p>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner hidden"></div>
    </div>

    <!-- Modal for Content Details -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <img id="modalPoster" class="modal-poster" src="" alt="" />
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p id="modalType" class="modal-type"></p>
                    <p id="modalRating" class="modal-rating"></p>
                    <p id="modalDescription" class="modal-description"></p>
                    <p id="modalReleaseDate" class="modal-release"></p>
                    <div class="modal-actions">
                        <button id="likeBtn" class="action-btn like-btn">❤️ Like</button>
                        <button id="bookmarkBtn" class="action-btn bookmark-btn">🔖 Bookmark</button>
                        <button id="rateBtn" class="action-btn rate-btn">⭐ Rate</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rating Modal -->
    <div id="ratingModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-rating">&times;</span>
            <h3>Rate this item</h3>
            <div class="rating-stars">
                <span class="star" data-value="1">⭐</span>
                <span class="star" data-value="2">⭐</span>
                <span class="star" data-value="3">⭐</span>
                <span class="star" data-value="4">⭐</span>
                <span class="star" data-value="5">⭐</span>
            </div>
            <button id="submitRating" class="submit-btn">Submit</button>
        </div>
    </div>

    <script src="assests/js/api.js"></script>
    <script src="assests/js/search.js"></script>
</body>

</html>
