<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Content Details</title>
    <link rel="stylesheet" href="assests/css/auth.css">
    <link rel="stylesheet" href="assests/css/dashboard.css">
    <link rel="stylesheet" href="assests/css/detail.css">
    <script src="assests/js/api.js"></script>
    <script src="assests/js/detail.js"></script>
    
</head>
<body class="redesign">
    <div id="wrapper">
        <header class="main-header">
            <div class="logo-box">
                <a href="dashboard.html"><img src="/frontend/assests/LuminaLogo.png" alt="Lumina Logo" class="lumina-logo"></a>
            </div>
            <div class="search-section">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search within Lumina..." id="navbar-query">
                </div>
            </div>
            <div class="user-section">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <div class="profile-circle"><i class="fas fa-user"></i></div>
            </div>
        </header>

        <div id="pagecontent" class="pagecontent">
            <div id="content-2-wide" class="flatland">
                <div id="main_top" class="main">
                    
                    <div class="title-overview">
                        <div id="title-overview-widget" class="heroic-overview">
                            <div class="vital">
                                <div class="title_block">
                                    <div class="title_bar_wrapper">
                                        <div class="ratings_wrapper">
                                            <div class="imdbRating">
                                                <div class="ratingValue">
                                                    <strong><span id="dynRating">-</span></strong><span class="grey">/10</span>
                                                </div>
                                                <a href="#"><span class="small" id="dynVoteCount">0</span> votes</a>
                                            </div>
                                        </div>
                                        <div class="titleBar">
                                            <div class="title_wrapper">
                                                <h1 itemprop="name" id="dynTitle">Loading Title... <span id="titleYear" class="grey">(2026)</span></h1>
                                                <div class="subtext">
                                                    <span id="dynRatingType">M</span> <span class="ghost">|</span>
                                                    <time id="dynRuntime">0 min</time> <span class="ghost">|</span>
                                                    <span id="dynGenres">Genres</span> <span class="ghost">|</span>
                                                    <span id="dynReleaseDate">Release Date</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="minPosterWithPlotSummaryHeight">
                                <div class="poster">
                                    <img id="dynPoster" src="assets/placeholder.png" alt="poster" />
                                </div>
                                <div class="plot_summary_wrapper">
                                    <div class="plot_summary">
                                        <div class="summary_text" id="dynOverview">
                                            Fetching dynamic overview from Lumina AI...
                                        </div>
                                        <div class="credit_summary_item">
                                            <h4 class="inline">Director:</h4> <span id="dynDirector">-</span>
                                        </div>
                                        <div class="credit_summary_item">
                                            <h4 class="inline">Stars:</h4> <span id="dynStars">-</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="article" id="titleCast">
                        <h2>Cast</h2>
                        <table class="cast_list" id="dynCastTable">
                            </table>
                    </div>

                    <div id="titleDidYouKnow" class="article">
                        <h2>Did You Know?</h2>
                        <div id="trivia" class="txt-block">
                            <h4>Trivia</h4>
                            <p id="dynTrivia">Loading trivia...</p>
                        </div>
                    </div>
                </div>

                <div id="sidebar">
                    <div class="mini-article">
                        <h3>Lumina Picks</h3>
                        <div class="widget_image">
                            <img id="sidebarImage" src="assets/placeholder.png" style="width:100%">
                        </div>
                        <p class="blurb">Based on your interest in this title, our AI suggests checking out the full collection.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/detail.js"></script>
</body>
</html>
